<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060a"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative orbs -->
  <circle cx="950" cy="150" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="200" cy="500" r="160" fill="#22d3ee" opacity="0.06"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#line)"/>
  
  <!-- Logo bracket -->
  <text x="80" y="120" font-family="monospace" font-size="18" fill="#7c8ba0">&lt;</text>
  <text x="96" y="120" font-family="sans-serif" font-size="18" font-weight="600" fill="#f1f5f9">Antonio</text>
  <text x="196" y="120" font-family="sans-serif" font-size="18" font-weight="600" fill="url(#accent)">Payá</text>
  <text x="246" y="120" font-family="monospace" font-size="18" fill="#7c8ba0"> /&gt;</text>
  
  <!-- Name -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="72" font-weight="900" fill="#f1f5f9" letter-spacing="-2">Antonio Payá</text>
  <text x="80" y="350" font-family="Inter, sans-serif" font-size="72" font-weight="900" fill="url(#accent)" letter-spacing="-2">González</text>
  
  <!-- Role line + role -->
  <rect x="80" y="390" width="40" height="3" fill="url(#line)" rx="1.5"/>
  <text x="134" y="398" font-family="monospace" font-size="20" fill="#94a3b8">Software Architect · PhD in Computer Engineering</text>
  
  <!-- Tags -->
  <rect x="80" y="440" width="100" height="32" rx="16" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15"/>
  <text x="100" y="461" font-family="sans-serif" font-size="13" font-weight="500" fill="#818cf8">Cloud</text>
  
  <rect x="195" y="440" width="130" height="32" rx="16" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15"/>
  <text x="215" y="461" font-family="sans-serif" font-size="13" font-weight="500" fill="#818cf8">Cybersecurity</text>
  
  <rect x="340" y="440" width="80" height="32" rx="16" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15"/>
  <text x="356" y="461" font-family="sans-serif" font-size="13" font-weight="500" fill="#818cf8">AI/ML</text>
  
  <rect x="435" y="440" width="110" height="32" rx="16" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15"/>
  <text x="455" y="461" font-family="sans-serif" font-size="13" font-weight="500" fill="#818cf8">Blockchain</text>
  
  <rect x="560" y="440" width="110" height="32" rx="16" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15"/>
  <text x="577" y="461" font-family="sans-serif" font-size="13" font-weight="500" fill="#818cf8">Terraform</text>
  
  <!-- URL -->
  <text x="80" y="570" font-family="monospace" font-size="16" fill="#7c8ba0">antoniopaya22.github.io</text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#line)"/>
